<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="text" id="numInput" placeholder="Digite um número" />
    <button onclick="verificarNumero()">Verificar</button>
  </body>
</html>

<script>
  //mostre todos os números de 1 até o número digitado e falar se e par ou impar
  function verificarNumero() {
    const numero = document.getElementById("numInput").value;
    for (let i = 1; i <= numero; i++) {
      if (i % 2 === 0) {
        console.log(i, "é par");
      } else {
        console.log(i, "é impar");
      }
    }
  }
</script>
